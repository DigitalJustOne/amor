<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carolina Tovar Leal</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa-vibrante: #e91e63;
            --oro-brillante: #d4af37;
            --blanco-cristal: rgba(255, 255, 255, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            /* AQUÍ ESTÁ EL TRUCO DE LA IMAGEN RESPONSIVA */
            background: url('imagen corazon rosa5.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        /* Capa overlay para que el fondo no sea tan chillón y se lea bien */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 245, 0.2);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 10;
            text-align: center;
            background: var(--blanco-cristal);
            width: 85%;
            max-width: 380px;
            padding: 2.5rem 1.5rem;
            border-radius: 30px;
            border: 3px solid var(--oro-brillante);
            backdrop-filter: blur(10px); /* Efecto vidrio esmerilado */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1.5s ease;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: var(--rosa-vibrante);
            margin: 0;
            text-shadow: 1px 1px 0px rgba(255,255,255,1);
        }

        .sub {
            font-size: 0.75rem;
            color: #af9500;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .box {
            background: white;
            padding: 15px 5px;
            border-radius: 15px;
            border: 1px solid #f8bbd0;
            box-shadow: 0 4px 10px rgba(216, 27, 96, 0.1);
        }

        .num {
            display: block;
            font-size: 2rem;
            font-weight: 700;
            color: var(--rosa-vibrante);
            line-height: 1;
        }

        .tag {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--oro-brillante);
        }

        #msg {
            font-style: italic;
            font-size: 1rem;
            color: #444;
            line-height: 1.6;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .heart {
            font-size: 2.5rem;
            color: var(--rosa-vibrante);
            animation: beat 1.2s infinite;
            display: inline-block;
            filter: drop-shadow(0 0 5px rgba(233, 30, 99, 0.5));
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilo para los pétalos que caen sobre la imagen */
        .petal {
            position: absolute;
            background: #ff80ab;
            border-radius: 150% 0 150% 0;
            opacity: 0.7;
            z-index: 5;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Carolina Tovar Leal</h1>
        <div class="sub">Desde el 3 de marzo de 2026</div>
        
        <div class="timer-grid">
            <div class="box"><span class="num" id="d">0</span><span class="tag">DÍAS</span></div>
            <div class="box"><span class="num" id="h">0</span><span class="tag">HORAS</span></div>
            <div class="box"><span class="num" id="m">0</span><span class="tag">MINUTOS</span></div>
            <div class="box"><span class="num" id="s">0</span><span class="tag">SEGUNDOS</span></div>
        </div>

        <div id="msg"></div>
        <div class="heart">❤</div>
    </div>

    <script>
        const target = new Date(2026, 2, 3, 0, 0, 0).getTime();
        const frases = [
            "Te deseo paz, amor y que nunca te falte una razón para sonreír.",
            "Hoy el contador marca un día más, pero mi cariño sigue intacto.",
            "Gracias por enseñarme lo que es amar de verdad.",
            "Nuestra historia es mi tesoro más preciado.",
            "Espero que estés cumpliendo cada uno de tus sueños.",
            "El 3 de marzo cambió mi vida, pero no borró lo que siento.",
            "Cinco años no se olvidan, se agradecen eternamente.",
            "Hoy brillas en mi memoria como el primer día.",
            "Tu felicidad siempre será mi mayor deseo.",
            "Recordarte es volver a vivir los momentos más bellos.",
            "Guardo con llave cada risa que compartimos.",
            "Deseo que encuentres toda la paz que mereces.",
            "Mi corazón guarda los mejores 5 años gracias a ti.",
            "Sigue brillando, el mundo necesita tu luz.",
            "Gracias por haber sido mi hogar durante tanto tiempo.",
            "Hasta que el tiempo se detenga, mi gratitud será infinita."
        ];

        function clock() {
            const diff = Date.now() - target;
            document.getElementById('d').innerText = Math.floor(diff / 86400000);
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000);
        }

        setInterval(clock, 1000); clock();
        document.getElementById('msg').innerText = `"${frases[Math.floor(Math.random() * frases.length)]}"`;

        for(let i=0; i<15; i++) {
            let p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random()*100+'vw';
            p.style.width = p.style.height = (Math.random()*12+8)+'px';
            p.style.animationDuration = (Math.random()*3+5)+'s';
            p.style.top = '-5vh';
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
