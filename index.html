<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carolina Tovar Leal</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa-fuerte: #d81b60; /* Rosa con fuerza, no lúgubre */
            --oro: #af9500;
            --fondo: #fff0f5;
        }

        body { 
            margin: 0; 
            background-color: var(--fondo); 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        /* Contenedor Adaptable */
        .card { 
            text-align: center; 
            background: white; 
            width: 85%; 
            max-width: 400px; 
            padding: 2rem; 
            border-radius: 20px; 
            border: 3px solid var(--oro); 
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.2);
            z-index: 10;
            position: relative;
        }

        h1 { 
            font-family: 'Dancing Script', cursive; 
            font-size: 2.5rem; 
            color: var(--rosa-fuerte); 
            margin: 0 0 10px 0; 
            line-height: 1.2;
        }

        .sub { 
            font-size: 0.85rem; 
            color: var(--oro); 
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        /* Grid del Contador Responsivo */
        .timer-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            margin-bottom: 20px;
        }

        .box { 
            background: #fff9fb; 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid #f8bbd0;
        }

        .num { 
            display: block; 
            font-size: 1.8rem; 
            font-weight: 700; 
            color: var(--rosa-fuerte); 
        }

        .tag { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            color: var(--oro);
        }

        #msg { 
            font-style: italic; 
            font-size: 1rem; 
            color: #444; 
            line-height: 1.5;
            margin: 20px 0;
            min-height: 60px;
        }

        .heart { 
            font-size: 2.5rem; 
            color: var(--rosa-fuerte); 
            animation: beat 1.2s infinite; 
            display: inline-block;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Pétalos con más color */
        .petal { 
            position: absolute; 
            background: #ff80ab; 
            border-radius: 150% 0 150% 0; 
            opacity: 0.6; 
            z-index: 1;
            animation: fall linear infinite; 
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Carolina Tovar Leal</h1>
        <div class="sub">DESDE EL 3 DE MARZO DE 2026</div>
        
        <div class="timer-grid">
            <div class="box"><span class="num" id="d">0</span><span class="tag">Días</span></div>
            <div class="box"><span class="num" id="h">0</span><span class="tag">Horas</span></div>
            <div class="box"><span class="num" id="m">0</span><span class="tag">Minutos</span></div>
            <div class="box"><span class="num" id="s">0</span><span class="tag">Segundos</span></div>
        </div>

        <div id="msg"></div>
        <div class="heart">❤</div>
    </div>

    <script>
        const target = new Date(2026, 2, 3, 0, 0, 0).getTime();
        const frases = [
            "Te deseo paz, amor y que nunca te falte una razón para sonreír.",
            "Hoy el contador marca un día más, pero mi cariño sigue intacto.",
            "Gracias por enseñarme lo que es amar de verdad durante tanto tiempo.",
            "Cuidado!.. un mostro!.",
            "Nuestra historia es mi tesoro más preciado.",
            "Espero que estés cumpliendo cada uno de tus sueños.",
            "El 3 de marzo cambió mi vida, pero no borró lo que siento.",
            "Siempre habrá un lugar para ti en mis oraciones.",
            "Eres una mujer increíble, nunca dejes que nadie te diga lo contrario.",
            "Cinco años no se olvidan, se agradecen eternamente.",
            "Que la vida te devuelva toda la belleza que tú me diste.",
            "A veces el amor también es saber soltar con el corazón lleno.",
            "Hoy brillas en mi memoria como el primer día.",
            "Tu felicidad siempre será mi mayor deseo.",
            "Recordarte es volver a vivir los momentos más bellos de mi vida.",
            "Cada segundo que pasa, agradezco haber coincidido contigo.",
            "Que este día sea tan especial como lo eres tú.",
            "Guardo con llave cada risa y cada aventura que compartimos.",
            "Siempre viajare con tu recuerdo y tu dulce voz a mi lado.",
            "Nos tomamos un tinto?.",
            "Deseo que encuentres toda la paz que este mundo puede ofrecer.",
            "Mi corazón guarda los mejores 5 años gracias a ti.",
            "Sigue brillando, el mundo necesita tu luz.",
            "Un brindis al cielo por lo que fuimos y por lo que serás.",
            "No hay distancia que borre la huella que dejaste en mí.",
            "Eres valiente, eres fuerte y eres inolvidable.",
            "Gracias por haber sido mi hogar durante tanto tiempo.",
            "Extraño cada domingo con tu compañia y los hermanos grim.",
            "Hasta que el tiempo se detenga, mi gratitud hacia ti será infinita."
        ];

        function clock() {
            const diff = Date.now() - target;
            document.getElementById('d').innerText = Math.floor(diff / 86400000);
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000);
        }

        setInterval(clock, 1000); clock();
        document.getElementById('msg').innerText = `"${frases[Math.floor(Math.random() * frases.length)]}"`;

        for(let i=0; i<20; i++) {
            let p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random()*100+'vw';
            p.style.width = p.style.height = (Math.random()*15+10)+'px';
            p.style.animationDuration = (Math.random()*2+4)+'s';
            p.style.top = '-5vh';
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
