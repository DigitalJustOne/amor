<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Carolina</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background: #fff0f5;
            font-family: 'Poppins', sans-serif;
        }

        .wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e8 100%);
        }

        .card {
            position: relative;
            z-index: 10; 
            width: 92%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.98);
            padding: 35px 20px;
            border-radius: 30px;
            border: 1.5px solid #d4af37;
            text-align: center;
            box-shadow: 0 15px 35px rgba(255, 46, 99, 0.1);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.4rem;
            color: #ff2e63;
            margin: 0 0 10px 0;
        }

        /* El mensaje que pediste */
        .intro-text {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 5px;
            font-weight: 300;
        }

        .highlight-date {
            font-size: 0.85rem;
            color: #af9500;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: block;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .box {
            background: #fff;
            padding: 12px;
            border-radius: 18px;
            border: 1px solid #ffe4e1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .num {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ff2e63;
            line-height: 1.1;
        }

        .tag { font-size: 0.65rem; color: #999; font-weight: 700; text-transform: uppercase; }

        #msg {
            font-size: 0.95rem;
            color: #444;
            font-style: italic;
            margin: 20px 0;
            line-height: 1.5;
            min-height: 60px;
        }

        .heart-main {
            font-size: 2.2rem;
            color: #ff2e63;
            animation: pulse 1.5s infinite;
            display: inline-block;
            margin-top: 10px;
        }

        /* ANIMACIONES DESDE EL TOPE */
        .particle {
            position: absolute;
            top: -60px; /* Asegura que nazcan fuera de la vista arriba */
            z-index: 100;
            pointer-events: none;
            will-change: transform;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="wrapper" id="container">
    <div class="card">
        <h1>Carolina Mi Amor</h1>
        
        <span class="intro-text">Desde el 3 de marzo de 2026</span>
        <span class="highlight-date">HE VIVIDO SIN TI:</span>
        
        <div class="timer-grid">
            <div class="box"><span class="num" id="d">0</span><span class="tag">Días</span></div>
            <div class="box"><span class="num" id="h">0</span><span class="tag">Horas</span></div>
            <div class="box"><span class="num" id="m">0</span><span class="tag">Minutos</span></div>
            <div class="box"><span class="num" id="s">0</span><span class="tag">Segundos</span></div>
        </div>

        <p id="msg"></p>
        <div class="heart-main">❤</div>
    </div>
</div>

<script>
    // Configuración de fecha
    const target = new Date(2026, 2, 3).getTime(); 

    function updateClock() {
        const now = new Date().getTime();
        const diff = now - target;
        
        // Si la fecha aún no llega, mostrará ceros o puedes ajustar la lógica
        const d = Math.max(0, Math.floor(diff / 86400000));
        const h = Math.max(0, Math.floor((diff % 86400000) / 3600000));
        const m = Math.max(0, Math.floor((diff % 3600000) / 60000));
        const s = Math.max(0, Math.floor((diff % 60000) / 1000));

        document.getElementById('d').innerText = d;
        document.getElementById('h').innerText = h;
        document.getElementById('m').innerText = m;
        document.getElementById('s').innerText = s;
    }
    setInterval(updateClock, 1000);
    updateClock();

    const frases = [
        
        "Te deseo paz, amor y que nunca te falte una razón para sonreír.",
        "Hoy el contador marca un día más, pero mi cariño sigue intacto.",
        "Gracias por enseñarme lo que es amar de verdad durante tanto tiempo.",
        "Cuidado!.. un mostro!.",
        "Nuestra historia es mi tesoro más preciado.",
        "Espero que estés cumpliendo cada uno de tus sueños.",
        "El 3 de marzo cambió mi vida, pero no borró lo que siento.",
        "Siempre habrá un lugar para ti en mis oraciones.",
        "Eres una mujer increíble, nunca dejes que nadie te diga lo contrario.",
        "Cinco años no se olvidan, se agradecen eternamente.",
        "Que la vida te devuelva toda la belleza que tú me diste.",
        "A veces el amor también es saber soltar con el corazón lleno.",
        "Hoy brillas en mi memoria como el primer día.",
        "Tu felicidad siempre será mi mayor deseo.",
        "Recordarte es volver a vivir los momentos más bellos de mi vida.",
        "Cada segundo que pasa, agradezco haber coincidido contigo.",
        "Que este día sea tan especial como lo eres tú.",
        "Guardo con llave cada risa y cada aventura que compartimos.",
        "Siempre viajare con tu recuerdo y tu dulce voz a mi lado.",
        "Nos tomamos un tinto?.",
        "Deseo que encuentres toda la paz que este mundo puede ofrecer.",
        "Mi corazón guarda los mejores 5 años gracias a ti.",
        "Sigue brillando, el mundo necesita tu luz.",
        "Un brindis al cielo por lo que fuimos y por lo que serás.",
        "No hay distancia que borre la huella que dejaste en mí.",
        "Eres valiente, eres fuerte y eres inolvidable.",
        "Gracias por haber sido mi hogar durante tanto tiempo.",
        "Extraño cada domingo con tu compañia y los hermanos grim.",
        "Hasta que el tiempo se detenga, mi gratitud hacia ti será infinita.",
        "Gracias por haber sido mi hogar durante tanto tiempo.",
        "Nuestra historia es mi tesoro más preciado.",
        "Te deseo toda la felicidad que el mundo pueda darte.",
        "Nos tomamos un tinto? ☕",
        "Cuidado!.. un mostro! 👾"
    ];
    document.getElementById('msg').innerText = `"${frases[Math.floor(Math.random() * frases.length)]}"`;

    // Lluvia de flores y corazones
    function createParticle() {
        const container = document.getElementById('container');
        const el = document.createElement('div');
        const isHeart = Math.random() > 0.5;
        
        el.className = 'particle';
        el.innerHTML = isHeart ? '❤' : '🌸';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (Math.random() * 20 + 15) + 'px';
        el.style.color = isHeart ? '#ff2e63' : '#ffb6c1';
        
        const duration = Math.random() * 3 + 5; // Un poco más lento para que se aprecie
        el.style.animationDuration = duration + 's';
        
        container.appendChild(el);
        setTimeout(() => { el.remove(); }, duration * 1000);
    }

    setInterval(createParticle, 350);
</script>

</body>
</html>
