<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Carolina</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #fff5f5; color: #5d4037; font-family: 'Quicksand', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { text-align: center; background: white; padding: 2.5rem; border-radius: 30px; box-shadow: 0 10px 30px rgba(212,175,55,0.2); border: 2px solid #d4af37; width: 85%; max-width: 450px; z-index: 10; position: relative; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: #b8860b; margin: 0; }
        .timer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .unit { background: #fffcf0; padding: 10px; border-radius: 12px; border: 1px solid #fce4ec; }
        .n { font-size: 1.6rem; font-weight: 700; color: #d4af37; display: block; }
        .l { font-size: 0.6rem; text-transform: uppercase; color: #bcaaa4; }
        #msg { font-style: italic; font-size: 1.1rem; color: #6d4c41; margin-top: 20px; min-height: 60px; line-height: 1.4; }
        .heart { font-size: 2rem; color: #f48fb1; margin-top: 15px; animation: p 1.5s infinite; display: inline-block; }
        @keyframes p { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .petal { position: absolute; background: #ffc0cb; border-radius: 150% 0 150% 0; opacity: 0.3; pointer-events: none; animation: f linear infinite; }
        @keyframes f { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>Carolina Tovar Leal</h1>
        <p style="font-size: 0.8rem; opacity: 0.7;">Desde el 3 de marzo de 2026</p>
        <div class="timer">
            <div class="unit"><span class="n" id="d">0</span><span class="l">Días</span></div>
            <div class="unit"><span class="n" id="h">0</span><span class="l">Hrs</span></div>
            <div class="unit"><span class="n" id="m">0</span><span class="l">Min</span></div>
            <div class="unit"><span class="n" id="s">0</span><span class="l">Seg</span></div>
        </div>
        <div id="msg">Cargando tu mensaje...</div>
        <div class="heart">❤</div>
    </div>

    <script>
        // Fecha exacta: 3 de marzo de 2026
        const start = new Date(2026, 2, 3).getTime(); 

        const msgs = [
            "Eres el recuerdo más dulce de mis últimos 5 años.",
            "Nuestra historia es mi tesoro más preciado.",
            "Te deseo toda la felicidad que el mundo pueda darte.",
            "Aunque hoy no estemos juntos, mi respeto es eterno.",
            "Gracias por cada sonrisa en estos 5 años juntos."
        ];

        function up() {
            const now = new Date().getTime();
            const diff = now - start;
            if (isNaN(diff)) return;

            document.getElementById('d').innerText = Math.floor(diff / 86400000);
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000);
        }

        setInterval(up, 1000);
        up();

        const randomMsg = msgs[Math.floor(Math.random() * msgs.length)];
        document.getElementById('msg').innerText = '"' + randomMsg + '"';

        // Lluvia de pétalos
        for(let i=0; i<15; i++) {
            let p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random()*100+'vw';
            p.style.width = p.style.height = (Math.random()*10+10)+'px';
            p.style.animationDuration = (Math.random()*3+5)+'s';
            p.style.top = '-5vh';
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
