<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Carolina | Siempre en mi mente</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #fce4ec;
            --gold: #d4af37;
            --deep-gold: #b8860b;
            --text-color: #5d4037;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #fff5f5 0%, #fce4ec 100%);
            color: var(--text-color);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Pétalos cayendo */
        .petal {
            position: absolute;
            background-color: #ffc0cb;
            border-radius: 150% 0 150% 0;
            opacity: 0.3;
            z-index: 1;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .container {
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15);
            border: 2px solid var(--gold);
            max-width: 85%;
            width: 550px;
            animation: fadeIn 2s ease-out;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            color: var(--deep-gold);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .subtitle {
            font-size: 1rem;
            color: #8d6e63;
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        /* Contador Elegante */
        .counter-wrapper {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            background: white;
            padding: 12px;
            border-radius: 15px;
            min-width: 75px;
            border: 1px solid var(--soft-pink);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #bcaaa4;
        }

        .message-box {
            font-style: italic;
            font-size: 1.2rem;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6d4c41;
            padding: 0 20px;
        }

        .heart {
            font-size: 2rem;
            color: #f48fb1;
            margin-top: 1.5rem;
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="petals-container"></div>

        <h1>Carolina Tovar Leal</h1>
        <div class="subtitle">Desde aquel 3 de marzo de 2026...</div>

        <div class="counter-wrapper" id="timer"></div>

        <div class="message-box" id="daily-message"></div>

        <div class="heart">♥</div>
    </div>
