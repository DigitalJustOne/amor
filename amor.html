<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Carolina | Un Recuerdo Eterno</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #e0e0e0;
            --accent-color: #ff6b6b;
            --bg-color: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Canvas para fondo animado */
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* Contenedor Principal */
        .container {
            z-index: 10;
            text-align: center;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            max-width: 90%;
            width: 600px;
            animation: fadeIn 3s ease-in-out;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        /* El Contador */
        .counter-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 10px;
            min-width: 70px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .number {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Cinzel', serif;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.6;
        }

        /* Mensaje Diario */
        .message-box {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-top: 2rem;
            position: relative;
        }

        .message-content {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease;
        }

        .message-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .heart-icon {
            color: var(--accent-color);
            font-size: 1.5rem;
            margin-top: 2rem;
            animation: pulse 2s infinite;
        }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 10px var(--accent-color); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 1.5rem; }
            .number { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="container">
        <h1>Carolina Tovar Leal</h1>
        <div class="subtitle">Desde que nuestros caminos se separaron el 3 de Marzo de 2025</div>

        <div class="counter-wrapper" id="timer">
            </div>

        <div class="message-box">
            <div class="message-content" id="daily-message">
                </div>
        </div>

        <div class="heart-icon">❤</div>
    </div>

    <script>
        // --- Configuración de la Fecha ---
        const breakUpDate = new Date('March 3, 2025 00:00:00').getTime();

        // --- Base de Datos de Mensajes (Puedes agregar cientos aquí) ---
        const messages = [
            "Aunque el tiempo pase, la huella de 5 años es imborrable.",
            "Cada día que pasa es un día más recordándote.",
            "El silencio es ruidoso cuando faltas tú.",
            "Te deseo felicidad, aunque mi corazón duela en la distancia.",
            "Nuestra historia terminó, pero mi memoria la guarda intacta.",
            "3 de Marzo: una fecha que cambió mi universo para siempre.",
            "Espero que sonrías, donde quiera que estés hoy.",
            "Lo que fuimos sigue viviendo en quien soy ahora.",
            "Cinco años no se borran, se transforman en eternidad.",
            "Te recuerdo con la misma intensidad del primer día."
        ];

        // --- Lógica del Contador ---
        function updateTimer() {
            const now = new Date().getTime();
            const distance = now - breakUpDate;

            if (distance < 0) {
                // Si la fecha es futura (por si acaso)
                document.getElementById("timer").innerHTML = "Esperando...";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = `
                <div class="time-unit"><span class="number">${days}</span><span class="label">Días</span></div>
                <div class="time-unit"><span class="number">${hours}</span><span class="label">Horas</span></div>
                <div class="time-unit"><span class="number">${minutes}</span><span class="label">Min</span></div>
                <div class="time-unit"><span class="number">${seconds}</span><span class="label">Seg</span></div>
            `;
        }

        setInterval(updateTimer, 1000);

        // --- Lógica del Mensaje Diario ---
        function showMessage() {
            // Usa el día del año para rotar mensajes, o aleatorio cada visita
            // Aquí usaremos aleatorio para que sea dinámico
            const randomIndex = Math.floor(Math.random() * messages.length);
            const msgElement = document.getElementById('daily-message');
            
            msgElement.textContent = `"${messages[randomIndex]}"`;
            msgElement.classList.add('visible');
        }

        showMessage();

        // --- Fondo de Partículas (Starfield Effect) ---
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() * 0.5) - 0.25;
                this.speedY = (Math.random() * 0.5) - 0.25;
                this.opacity = Math.random();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.opacity > 0.01) this.opacity -= 0.001; 
                if (this.opacity <= 0.01) this.opacity = 1; // parpadeo lento
                
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
